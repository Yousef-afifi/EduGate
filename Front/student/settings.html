<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - EduGate</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="../index.html" class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          EduGate
        </a>
      </div>
      <div class="sidebar-user">
        <div class="user-avatar" style="background:#3B82F6;">SJ</div>
        <div class="user-info"><div class="user-name">Sarah Johnson</div><div class="user-role">Student</div></div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section"><div class="nav-section-title">Main</div>
          <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
          <a href="courses.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>My Courses</a>
          <a href="exams.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Exams</a>
          <a href="schedule.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</a>
        </div>
        <div class="nav-section"><div class="nav-section-title">Account</div>
          <a href="settings.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <a href="../login.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h1 class="topbar-title">Settings</h1>
        <div class="topbar-actions">
          <button class="icon-btn" onclick="showToast('No new notifications', 'info')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span style="position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--primary);border-radius:50%;"></span></button>
        </div>
      </div>

      <div class="page-content">
        <div style="max-width:700px;">
          <div class="settings-section">
            <h3 class="settings-title">Profile Information</h3>
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;">
              <div class="user-avatar" style="width:64px;height:64px;font-size:24px;background:#3B82F6;">SJ</div>
              <div><button class="btn btn-sm btn-outline">Change Avatar</button></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
              <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-input" value="Sarah"></div>
              <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-input" value="Johnson"></div>
            </div>
            <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" value="sarah.j@student.edu" readonly style="background:var(--bg-cream);"></div>
            <div style="display:flex;justify-content:flex-end;"><button class="btn btn-primary" onclick="showToast('Profile saved!', 'success')">Save Changes</button></div>
          </div>

          <div class="settings-section">
            <h3 class="settings-title">Security</h3>
            <div class="form-group"><label class="form-label">Current Password</label><input type="password" class="form-input" placeholder="Enter current password"></div>
            <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-input" placeholder="Enter new password"></div>
            <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" class="form-input" placeholder="Confirm new password"></div>
            <div style="display:flex;justify-content:flex-end;"><button class="btn btn-primary" onclick="showToast('Password updated!', 'success')">Update Password</button></div>
          </div>

        </div>
      </div>
    </main>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
