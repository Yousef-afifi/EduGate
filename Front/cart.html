<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Cart - EduPlatform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="student-shell">

<div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99"></div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-mark">&#127891;</div>
      <span class="sidebar__logo-name">EduPlatform</span>
    </div>

    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">U</div>
      <div>
        <div class="sidebar__user-name" id="sidebar-user-name">Loading...</div>
        <div class="sidebar__user-role" id="sidebar-user-role">-</div>
      </div>
    </div>

    <nav class="sidebar__nav" id="sidebar-nav"></nav>

    <div class="sidebar__bottom">
      <button class="sidebar__logout" id="logout-btn">
        <span class="nav-icon">&#128682;</span> Sign Out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar__left">
        <button class="menu-toggle" id="menu-toggle">&#9776;</button>
        <button class="sidebar-peek-toggle" id="sidebar-peek-toggle" title="Toggle sidebar">&#9776;</button>
        <div>
          <div class="topbar__title">My Cart</div>
          <div class="topbar__breadcrumb" id="page-breadcrumb"></div>
        </div>
      </div>
      <div class="topbar__right">
        <div class="topbar-search">
          <span class="search-icon">&#128269;</span>
          <input type="text" placeholder="Search cart items..." />
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--navy)" id="topbar-user-name"></div>
      </div>
    </header>

    <main class="page-body" id="cart-content"></main>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  requireAuth();
  populateSidebarUser();
  setBreadcrumbTrail('page-breadcrumb', [
    { label: 'Home', href: 'dashboard.html' },
    { label: 'Study Materials & Bundles', href: 'dashboard.html?view=progress' },
    { label: 'Book Orders' },
  ]);

  const navItems = [
    { icon: '&#127968;', label: 'Dashboard', page: 'dashboard.html' },
    { icon: '&#128218;', label: 'My Courses', page: 'courses.html' },
    { icon: '&#128221;', label: 'My Exams', page: 'exams.html', badge: '2' },
    { icon: '&#128214;', label: 'Book Store', page: 'dashboard.html?view=progress' },
    { icon: '&#128722;', label: 'My Cart', page: 'cart.html' },
    { icon: '&#128197;', label: 'Schedule', page: 'dashboard.html?view=schedule' },
    { icon: '&#9881;', label: 'Settings', page: 'dashboard.html?view=settings' },
  ];

  document.getElementById('sidebar-nav').innerHTML =
    '<div class="sidebar__nav-section">Workspace</div>' +
    navItems.map((item) => `
      <a href="${item.page}" class="nav-item" data-page="${item.page}">
        <span class="nav-icon">${item.icon}</span>
        <span>${item.label}</span>
        ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
      </a>
    `).join('');

  document.querySelectorAll('#sidebar-nav .nav-item').forEach((item) => {
    if (item.getAttribute('href') === 'cart.html') item.classList.add('active');
  });

  document.getElementById('sidebar-peek-toggle')?.addEventListener('click', () => {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const open = sidebar.classList.toggle('open');
    overlay.style.display = open ? 'block' : 'none';
  });

  document.getElementById('sidebar-overlay')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').style.display = 'none';
  });

  function getStatusClass(status) {
    if (status === 'Delivered') return 'delivered';
    if (status === 'Ready for Pickup') return 'ready';
    return 'preparing';
  }

  function getAccentClass(index) {
    return ['student-book-card__media--1', 'student-book-card__media--2', 'student-book-card__media--3'][index % 3];
  }

  function removeCartItem(bookId) {
    removeBookFromCart(bookId);
    showToast('Book removed from cart.', 'info');
    renderCart();
  }

  function renderCart() {
    const items = getBookCart();
    const container = document.getElementById('cart-content');

    if (!items.length) {
      container.innerHTML = `
        <div class="info-card" style="max-width:720px">
          <h3>Your cart is empty</h3>
          <p style="font-size:14px;color:var(--gray-600);line-height:1.8;margin-bottom:18px">You have not added any study bundles yet. Open the book store and choose the material you want to receive.</p>
          <button class="btn-primary" style="width:auto;padding-inline:24px" onclick="window.location.href='dashboard.html?view=progress'">Open Book Store</button>
        </div>
      `;
      return;
    }

    const subtotal = items.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
    container.innerHTML = `
      <div class="section-header">
        <div>
          <div class="section-title">Book Orders</div>
          <div style="font-size:13px;color:var(--gray-400);margin-top:6px">Track requested books and follow each delivery status.</div>
        </div>
      </div>
      <div class="cart-layout">
        <div class="cart-list">
          ${items.map((item, index) => `
            <div class="cart-item">
              <div class="cart-item__media ${getAccentClass(index)}">
                <div class="cart-item__label">${item.grade || 'Bundle'}</div>
                <div class="cart-item__emoji">${item.emoji || '&#128218;'}</div>
              </div>
              <div>
                <div class="cart-item__title">${item.title}</div>
                <div class="cart-item__subtitle">${item.subtitle || 'Study material selected from the student book store.'}</div>
                <div class="cart-item__meta">
                  <span>Quantity: ${item.quantity || 1}</span>
                  <span>Requested: ${new Date(item.orderedAt || Date.now()).toLocaleDateString()}</span>
                </div>
                <div class="cart-item__footer">
                  <div>
                    <div class="cart-item__price">${item.price * (item.quantity || 1)} EGP</div>
                    <div style="font-size:13px;color:var(--gray-400);margin-top:6px">Delivery status</div>
                  </div>
                  <div class="cart-item__actions">
                    <span class="status-pill ${getStatusClass(item.status)}">${item.status}</span>
                    <button class="cart-item__remove" onclick="removeCartItem('${item.id}')">Remove</button>
                  </div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
        <aside class="cart-summary">
          <div class="cart-summary__title">Order Summary</div>
          <div class="cart-summary__row"><span>Books</span><strong>${items.length}</strong></div>
          <div class="cart-summary__row"><span>Total Units</span><strong>${items.reduce((sum, item) => sum + (item.quantity || 1), 0)}</strong></div>
          <div class="cart-summary__row"><span>Subtotal</span><strong>${subtotal} EGP</strong></div>
          <div class="cart-summary__row"><span>Pickup Method</span><strong>School Counter</strong></div>
          <div class="cart-summary__note">The student can use this page to know which book was requested and whether it is still preparing, ready for pickup, or already delivered.</div>
        </aside>
      </div>
    `;
  }

  renderCart();
  initMobileSidebar();
</script>
</body>
</html>
